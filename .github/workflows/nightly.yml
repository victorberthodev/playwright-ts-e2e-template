name: Nightly Regression

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  TEST_ENV: dev

jobs:
  regression:
    name: Regression (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}-${{ matrix.browser }}

      - name: Install browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Install OS deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps ${{ matrix.browser }}

      - name: Full regression
        run: pnpm exec playwright test --project=setup --project=ui-${{ matrix.browser }} --project=api --grep @regression

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-allure-${{ matrix.browser }}
          path: allure-results
          retention-days: 30

  notify-on-failure:
    name: Open issue on failure
    needs: regression
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const title = `nightly regression failed (${date})`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The scheduled nightly regression failed on **${date}**.`,
              ``,
              `- Workflow: \`${context.workflow}\``,
              `- Commit: \`${context.sha}\``,
              `- Run: ${runUrl}`,
              ``,
              `Allure results for each browser are attached as workflow artifacts.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['nightly', 'bug'],
            });
